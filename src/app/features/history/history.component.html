<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8 lg:py-12">
  <!-- Header with title and navigation -->
  <header
    class="mb-8 flex flex-col items-start justify-between gap-4 sm:flex-row sm:items-center sm:mb-10"
  >
    <div>
      <h1 class="text-3xl font-semibold tracking-tight text-foreground sm:text-4xl lg:text-5xl">
        Historique hebdomadaire
      </h1>
      <p class="mt-1.5 flex items-center gap-2 text-sm text-muted-foreground">
        <ng-icon name="lucideCalendar" size="sm" />
        {{ weekRangeLabel() }}
      </p>
    </div>

    <nav
      aria-label="Navigation entre semaines"
      class="flex flex-row gap-2 self-end sm:self-auto w-[40%]"
    >
      <button
        type="button"
        hlmBtn
        variant="outline"
        size="sm"
        (click)="previousWeek()"
        aria-label="Semaine précédente"
        class="flex-1"
      >
        <ng-icon name="lucideChevronLeft" size="sm" />
        Précédent
      </button>

      <button
        type="button"
        hlmBtn
        variant="outline"
        size="sm"
        (click)="nextWeek()"
        [disabled]="isNextWeekDisabled()"
        aria-label="Semaine suivante"
        class="flex-1"
      >
        Suivant
        <ng-icon name="lucideChevronRight" size="sm" />
      </button>

      <button
        type="button"
        hlmBtn
        variant="default"
        size="sm"
        class="flex-1 bg-pink-300 hover:bg-pink-400 text-foreground"
        (click)="goToCurrentWeek()"
        aria-label="Semaine en cours"
      >
        <ng-icon name="lucideCalendar" size="sm" />
        Aujourd'hui
      </button>
    </nav>
  </header>

  <!-- Week days grid -->
  <section aria-label="Statistiques par jour de la semaine" class="mb-10">
    <div class="flex flex-col sm:flex-row gap-4">
      @for (day of weeklyStats().days; track $index) {
        @if (isInCurrentWeek(day.date)) {
          <div
            role="button"
            tabindex="0"
            class="w-full sm:flex-1 sm:min-w-0 cursor-pointer outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 rounded-2xl"
            (click)="openCatchUpModal(day.date)"
            (keydown.enter)="openCatchUpModal(day.date)"
            (keydown.space)="onSpaceKey($event, day.date)"
            [attr.aria-label]="
              'Ouvrir le rattrapage pour le ' +
              day.date.getDate() +
              '/' +
              (day.date.getMonth() + 1) +
              '/' +
              day.date.getFullYear()
            "
          >
            <app-week-day-card
              [dayStats]="day"
              [scheduledExercises]="isToday(day.date) ? exercises() : []"
              [isToday]="isToday(day.date)"
            />
          </div>
        } @else {
          <app-week-day-card
            [dayStats]="day"
            [scheduledExercises]="isToday(day.date) ? exercises() : []"
            [isToday]="isToday(day.date)"
          />
        }
      }
    </div>
  </section>

  <!-- Weekly summary -->
  <section aria-label="Résumé hebdomadaire">
    <app-weekly-summary [weeklyStats]="weeklyStats()" />
  </section>

  <!-- Catch-up modal -->
  @if (selectedDate()) {
    <hlm-dialog #dialog [state]="'open'">
      <app-catch-up-modal
        [date]="selectedDate()!"
        [exercises]="exercises()"
        (closed)="onModalClosed(); dialog.close()"
      />
    </hlm-dialog>
  }
</main>
