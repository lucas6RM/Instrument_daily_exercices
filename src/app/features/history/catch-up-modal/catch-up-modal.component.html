<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
  role="dialog"
  aria-modal="true"
  aria-label="Rattrapage des exercices"
>
  <div class="w-full max-w-lg rounded-xl bg-white p-6 shadow-xl">
    <!-- Header -->
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-gray-900">
        Rattrapage — {{ date() }}
      </h2>
      <button
        type="button"
        (click)="closeModal()"
        aria-label="Fermer le modal"
        class="rounded-lg p-1.5 text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-green-500"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Exercise list -->
    <div class="space-y-3" role="list" aria-label="Liste des exercices">
      @for (ex of catchUpExercises(); track ex.exerciseId) {
        <div
          role="listitem"
          class="flex items-center gap-3 rounded-lg border border-gray-200 px-3 py-2"
          [class.opacity-50]="ex.status === 'removed'"
          [class.border-green-200]="ex.status === 'completed'"
          [class.bg-green-50]="ex.status === 'completed'"
        >
          <!-- Checkbox -->
          <div class="relative flex shrink-0 items-center" role="presentation">
            <input
              type="checkbox"
              [checked]="ex.completed"
              [disabled]="true"
              tabindex="-1"
              [attr.aria-label]="'Marquer ' + ex.name + ' comme terminé'"
              class="h-4 w-4 rounded border-gray-300"
            />
            @if (ex.completed) {
              <span class="pointer-events-none absolute inset-0 flex items-center justify-center text-green-600">
                <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
              </span>
            }
          </div>

          <!-- Exercise info -->
          <div class="min-w-0 flex-1">
            <span
              class="block truncate text-sm font-medium text-gray-900"
              [class.line-through]="ex.completed"
              [class.text-gray-400]="ex.completed"
            >
              {{ ex.name }}
              @if (ex.status === 'removed') {
                <span class="font-normal text-gray-400"> (supprimé)</span>
              }
            </span>
            <span class="block text-xs text-gray-500">
              {{ ex.durationSeconds }}s
            </span>
          </div>

          <!-- Time display -->
          @if (ex.completed) {
            <app-exercise-time-display
              [actualMinutes]="ex.actualMinutes"
              [bonusMinutes]="ex.bonusMinutes"
              [completed]="ex.completed"
              [playCount]="ex.playCount"
            />
          }

          <!-- Play button -->
          @if (ex.status !== 'removed') {
            <button
              type="button"
              (click)="playExercise(ex.exerciseId)"
              [disabled]="activeTimerExerciseId() !== null"
              [attr.aria-label]="'Lancer le timer pour ' + ex.name"
              class="shrink-0 rounded-lg bg-blue-600 px-2.5 py-1 text-xs font-semibold text-white transition-colors hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-600"
            >
              ▶ PLAY
            </button>
          }
        </div>
      }
    </div>

    <!-- Footer -->
    <div class="mt-6 flex justify-end">
      <button
        type="button"
        (click)="closeModal()"
        class="rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-green-500"
      >
        Fermer
      </button>
    </div>
  </div>
</div>
