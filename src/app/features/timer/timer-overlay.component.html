@if (visible()) {
  <div
    class="fixed inset-0 z-50 flex flex-col items-center justify-center gap-8 bg-white p-6 sm:gap-12"
    role="timer"
    aria-live="polite"
    aria-atomic="true"
    [attr.aria-label]="'Compte à rebours : ' + formattedTime() + ', exercice : ' + exerciseName()"
  >
    <!-- Exercise name -->
    @if (exerciseName()) {
      <span class="text-center text-lg text-muted-foreground">{{ exerciseName() }}</span>
    }

    <!-- Timer display -->
    <span
      class="tabular-nums tracking-tight text-[48px] font-semibold leading-none"
      id="timer-display"
    >
      {{ formattedTime() }}
    </span>

    <!-- Progress bar -->
    <hlm-progress
      class="w-full max-w-xs sm:max-w-sm"
      [value]="progress()"
      aria-label="Progression du timer"
      [attr.aria-valuenow]="progress()"
      [attr.aria-valuemin]="0"
      [attr.aria-valuemax]="100"
      [attr.aria-labelledby]="'timer-display'"
    >
      <hlm-progress-indicator />
    </hlm-progress>

    <!-- Control buttons -->
    <div class="flex items-center gap-3">
      @if (isRunning()) {
        <button
          type="button"
          hlmBtn
          variant="default"
          (click)="pause()"
          aria-label="Pause"
        >
          <ng-icon name="lucidePause" />
          Pause
        </button>
      } @else {
        <button
          type="button"
          hlmBtn
          variant="default"
          (click)="resume()"
          aria-label="Reprendre"
        >
          <ng-icon name="lucidePlay" />
          Reprendre
        </button>
      }

      <button
        type="button"
        hlmBtn
        variant="outline"
        (click)="reset()"
        aria-label="Réinitialiser"
      >
        <ng-icon name="lucideRotateCcw" />
        Réinitialiser
      </button>

      <button
        type="button"
        hlmBtn
        variant="ghost"
        size="icon"
        (click)="reset()"
        aria-label="Fermer"
      >
        <ng-icon name="lucideX" />
      </button>
    </div>
  </div>
}
