@let ex = exercise();
@let completed = isCompleted();

<div
  class="flex items-center gap-3 rounded-[14px] border border-border bg-white px-4 py-4 sm:gap-4"
  [class]="completed ? 'border-border' : ''"
>
  <div class="relative flex shrink-0 items-center" role="presentation">
    <input
      type="checkbox"
      [checked]="completed"
      [disabled]="true"
      tabindex="-1"
      [attr.aria-label]="'Marquer ' + ex.name + ' comme terminé'"
      class="h-5 w-5 rounded border border-border"
    />
    @if (completed) {
      <span class="text-foreground absolute inset-0 flex items-center justify-center pointer-events-none">
        <ng-icon name="lucideCheck" class="text-[length:--spacing(3.5)]" />
      </span>
    }
  </div>

  <div class="min-w-0 flex-1">
    <span
      [class.line-through]="completed"
      [class.text-muted-foreground]="completed"
      class="block truncate text-sm font-medium text-foreground"
    >
      {{ ex.name }}
    </span>
    <span class="block truncate text-xs text-muted-foreground"> {{ ex.durationSeconds }} s </span>
    @if (completed) {
      <app-exercise-time-display
        [actualMinutes]="actualMinutes()"
        [bonusMinutes]="bonusMinutes()"
        [completed]="true"
        [playCount]="playCount()"
      />
    }
  </div>

  <div class="flex shrink-0 items-center gap-2">
    @if (ex.youtubeUrl) {
      <a
        [href]="ex.youtubeUrl"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Voir la vidéo YouTube pour ' + ex.name"
        class="inline-flex items-center rounded-lg p-1.5 text-muted-foreground transition-colors hover:bg-muted focus-visible:outline focus-visible:outline-offset-2 focus-visible:outline-ring"
      >
        <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
          />
        </svg>
      </a>
    }
    <button
      type="button"
      hlmBtn
      variant="default"
      size="sm"
      (click)="playExercise.emit()"
      aria-label="Lancer le timer pour {{ ex.name }}"
    >
      <ng-icon name="lucidePlay" class="text-[length:--spacing(3.5)] sm:text-[length:--spacing(4)]" />
      Play
    </button>
  </div>
</div>
