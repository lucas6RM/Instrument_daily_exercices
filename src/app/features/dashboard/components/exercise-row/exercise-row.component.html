@let ex = exercise();
@let completed = isCompleted();

<div
  class="flex items-center gap-3 rounded-[14px] border border-border bg-white px-4 py-4 sm:gap-4"
  [class]="completed ? 'border-border' : ''"
>
  <div
    class="flex items-center cursor-pointer"
    [class.pointer-events-none]="isDisabled()"
    [class.opacity-60]="isDisabled()"
    (click)="toggleComplete.emit()"
    (keyup)="toggleComplete.emit()"
    [attr.aria-label]="'Statut de ' + ex.name + ': ' + (completed ? 'terminé' : 'non terminé')"
    role="checkbox"
    [attr.aria-checked]="completed"
    tabindex="0"
  >
    <div
      class="w-5 h-5 rounded border flex items-center justify-center"
      [class]="completed ? 'bg-foreground border-foreground' : 'border-input bg-background'"
    >
      @if (completed) {
        <svg class="w-3 h-3 text-background" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      }
    </div>
  </div>

  <div class="min-w-0 flex-1">
    <span
      [class.line-through]="completed"
      [class.text-muted-foreground]="completed"
      class="block truncate text-sm font-medium text-foreground"
    >
      {{ ex.name }}
    </span>
    <span class="block truncate text-xs text-muted-foreground"> {{ ex.durationMinutes }} min </span>
    @if (completed) {
      <app-exercise-time-display
        [actualMinutes]="actualMinutes()"
        [bonusMinutes]="bonusMinutes()"
        [completed]="true"
        [playCount]="playCount()"
      />
    }
  </div>

  <div class="flex shrink-0 items-center gap-2">
    @if (ex.youtubeUrl) {
      <a
        [href]="ex.youtubeUrl"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Voir la vidéo YouTube pour ' + ex.name"
        class="inline-flex items-center rounded-lg p-1.5 text-muted-foreground transition-colors hover:bg-muted focus-visible:outline focus-visible:outline-offset-2 focus-visible:outline-ring"
      >
        <ng-icon name="lucideYoutube" class="h-5 w-5" />
      </a>
    }
    @if (completed) {
      <button
        type="button"
        hlmBtn
        variant="destructive"
        size="sm"
        class="bg-pink-300 hover:bg-pink-400 focus-visible:ring-pink-200 dark:bg-pink-400 dark:hover:bg-pink-500 text-white focus-visible:border-pink-300"
        (click)="playExercise.emit()"
        [attr.aria-label]="'Lancer le timer pour ' + ex.name"
      >
        <ng-icon
          name="lucidePlay"
          class="text-[length:--spacing(3.5)] sm:text-[length:--spacing(4)]"
        />
        Bonus
      </button>
    } @else {
      <button
        type="button"
        hlmBtn
        variant="default"
        size="sm"
        (click)="playExercise.emit()"
        [attr.aria-label]="'Lancer le timer pour ' + ex.name"
      >
        <ng-icon
          name="lucidePlay"
          class="text-[length:--spacing(3.5)] sm:text-[length:--spacing(4)]"
        />
        Play
      </button>
    }
  </div>
</div>
