@let pct = percentage();
@let text = displayText();
@let isComplete = pct === 100;

<div class="w-full rounded-xl bg-muted/50 p-4 sm:p-5" role="region" aria-label="Barre de progression">
  <div class="mb-2 flex items-center justify-between">
    <span class="text-sm font-semibold text-foreground sm:text-base" id="progress-label">
      {{ text }}
    </span>
    @if (isComplete) {
      <span hlmBadge variant="default">
        Séance terminée !
      </span>
    }
  </div>

  <hlm-progress
    [value]="pct"
    [max]="100"
    role="progressbar"
    aria-valuemin="0"
    [attr.aria-valuemax]="100"
    [attr.aria-valuenow]="pct"
    [attr.aria-labelledby]="'progress-label'"
    [attr.aria-valuetext]="text"
    class="h-3 sm:h-4"
  >
    <hlm-progress-indicator />
  </hlm-progress>
</div>
