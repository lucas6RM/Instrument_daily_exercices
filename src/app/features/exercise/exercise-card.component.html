@let ex = exercise();

<article
  hlmCard
  class="transition-shadow duration-200 hover:shadow-md"
  role="listitem"
>
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div class="min-w-0 flex-1">
      <h3 class="text-base font-semibold text-card-foreground sm:text-lg">
        {{ ex.name }}
      </h3>

      <p class="mt-1 text-sm text-muted-foreground">
        Durée : {{ ex.durationSeconds }} s
      </p>

      @if (ex.youtubeUrl) {
        <p class="mt-2">
          <a
            [href]="ex.youtubeUrl"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="'Voir la vidéo YouTube pour ' + ex.name"
            class="inline-flex items-center gap-1 text-sm font-medium text-muted-foreground underline decoration-muted-foreground/30 underline-offset-2 transition-colors hover:text-foreground focus-visible:no-underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring"
          >
            <ng-icon name="lucideYoutube" size="1em" class="h-4 w-4" />
            Voir la vidéo YouTube
          </a>
        </p>
      }

      @if (ex.description) {
        <p class="mt-2 text-sm leading-relaxed text-muted-foreground">
          {{ ex.description }}
        </p>
      }
    </div>

    <div class="flex shrink-0 gap-2 sm:flex-col">
      <button
        type="button"
        hlmBtn
        variant="ghost"
        size="sm"
        (click)="edit.emit(ex)"
        aria-label="Modifier {{ ex.name }}"
      >
        <ng-icon name="lucidePen" size="1em" />
        Modifier
      </button>

      <button
        type="button"
        hlmBtn
        variant="destructive"
        size="sm"
        (click)="delete.emit(ex.id)"
        aria-label="Supprimer {{ ex.name }}"
      >
        <ng-icon name="lucideTrash" size="1em" />
        Supprimer
      </button>
    </div>
  </div>
</article>
